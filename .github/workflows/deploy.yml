name: CI/CD to EKS (Helm)

on:
  workflow_run:
    workflows: ["EKS-Creation-Using-Terraform"]
    types:
      - completed
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: my-eks-cluster
  IMAGE_NAME: my-app

jobs:

  #DEPLOY
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      #Build image
      - name: Build Docker
        run: docker build -t $IMAGE_NAME ./app

      #Login DockerHub
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #Push image
      - name: Push image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      #AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      #kubectl
      - name: setup kubectl
        uses: azure/setup-kubectl@v3

      #Helm
      - name: setup Helm
        uses: azure/setup-helm@v3

      #EKS cluster
      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      #Helm Deply
      - name: Helm Deploy
        run: |
          helm upgrade --install my-app ./helm/my-app \
            --set image.repository=${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME \
            --set image.tag=${{ github.sha }} \
            --wait

      #Verify deployment
      - name: Verify deployment
        run: kubectl get pods