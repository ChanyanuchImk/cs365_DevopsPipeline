name: CI/CD to EKS (Helm)

on:
  workflow_run:
    workflows: ["EKS-Creation-Using-Terraform"]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: my-eks-cluster
  IMAGE_NAME: my-app

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install deps
      run: |
        cd app
        npm install

    - name: Run tests
      run: |
        cd app
        npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 🐳 Build image
    - name: Build Docker
      run: docker build -t $IMAGE_NAME ./app

    # 🔐 Login DockerHub
    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 📦 Push image (ใช้ commit SHA)
    - name: Push image
      run: |
        docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

    # 🔐 AWS login
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ⚙️ Connect EKS
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

    # ⚙️ Install Helm
    - name: Setup Helm
      uses: azure/setup-helm@v3

    # 🚀 Deploy
    - name: Deploy with Helm
      run: |
        helm upgrade --install my-app ./my-app-chart \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME \
          --set image.tag=${{ github.sha }}