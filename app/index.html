<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Rangsit Facilities</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TU Rangsit Facilities ✨</h1>
            <p>Explore facilities at Thammasat University, Rangsit Campus.</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search facilities or categories...">
        </div>

        <main class="grid-layout" id="memberGrid">
            <!-- Facility 1 -->
            <div class="card" data-title="Puey Ungphakorn Library" data-category="Library" data-desc="A central hub for learning and research. Featuring an eco-friendly design, extensive book collections, and quiet zones for focused studying.">
                <div class="card-image bg-gradient-1">
                    <span class="initials">PL</span>
                </div>
                <div class="card-content">
                    <h2>Puey Ungphakorn Library</h2>
                    <p class="role">Library</p>
                </div>
            </div>

            <!-- Facility 2 -->
            <div class="card" data-title="SC Building" data-category="Study Area" data-desc="The main center for social sciences and general education, offering various lecture halls, study rooms, and vibrant student activity spaces.">
                <div class="card-image bg-gradient-2">
                    <span class="initials">SC</span>
                </div>
                <div class="card-content">
                    <h2>SC Building</h2>
                    <p class="role">Study Area</p>
                </div>
            </div>

            <!-- Facility 3 -->
            <div class="card" data-title="Main Stadium" data-category="Sports Complex" data-desc="The primary sports facility for university events, equipped with a standard football pitch, athletic tracks, and seating for spectators.">
                <div class="card-image bg-gradient-3">
                    <span class="initials">MS</span>
                </div>
                <div class="card-content">
                    <h2>Main Stadium</h2>
                    <p class="role">Sports Complex</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="facilityModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle">Facility Name</h2>
            <p id="modalCategory" class="role">Category</p>
            <p id="modalDescription" class="description">Facility Description</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
